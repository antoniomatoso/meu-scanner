<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner Profissional Escolar</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background: #1a1a1a; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        
        /* Moldura de Scanner */
        .scanner-container { position: relative; width: 90%; max-width: 400px; height: 60vh; border: 2px solid rgba(255, 255, 255, 0.3); border-radius: 15px; overflow: hidden; display: flex; align-items: center; justify-content: center; background: #000; }
        
        .guide-box { position: absolute; width: 80%; height: 80%; border: 2px solid #00ff00; box-shadow: 0 0 15px #00ff00; border-radius: 5px; z-index: 10; pointer-events: none; }
        
        .guide-text { position: absolute; bottom: 10px; width: 100%; text-align: center; color: #00ff00; font-size: 12px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }

        .controls { margin-top: 30px; text-align: center; width: 100%; }
        
        .btn-scan { background: #00ff00; color: #000; border: none; padding: 15px 40px; font-size: 18px; font-weight: bold; border-radius: 50px; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 15px rgba(0, 255, 0, 0.3); }
        
        .btn-scan:active { transform: scale(0.95); }

        #preview-img { position: absolute; width: 100%; height: 100%; object-fit: cover; display: none; z-index: 5; }
        
        .status-bar { margin-top: 15px; color: #aaa; font-size: 14px; }
    </style>
</head>
<body>

    <h2 style="margin-bottom: 20px;">Scanner de Documentos</h2>

    <div class="scanner-container">
        <!-- Moldura Visual -->
        <div class="guide-box"></div>
        <div class="guide-text">Alinhe o documento aqui</div>
        
        <!-- Preview da Foto Tirada -->
        <img id="preview-img">
        
        <p id="placeholder" style="color: #444; padding: 20px; text-align: center;">Aguardando captura...</p>
    </div>

    <div class="controls">
        <input type="file" accept="image/*" capture="environment" id="file-input" style="display:none">
        <button class="btn-scan" onclick="document.getElementById('file-input').click()">CAPTURAR</button>
        <div class="status-bar" id="status">Pronto para uso interno</div>
    </div>

    <script>
        const input = document.getElementById('file-input');
        const img = document.getElementById('preview-img');
        const placeholder = document.getElementById('placeholder');
        const status = document.getElementById('status');

        input.addEventListener('change', function() {
            const file = this.files[0];
            if (file) {
                const reader = new FileReader();
                status.innerText = "Processando imagem...";
                
                reader.onload = function(e) {
                    img.src = e.target.result;
                    img.style.display = 'block';
                    placeholder.style.display = 'none';
                    status.innerText = "Documento capturado com sucesso!";
                }
                reader.readAsDataURL(file);
            }
        });
    </script>
</body>
</html>
